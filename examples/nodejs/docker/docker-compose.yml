version: "3.8"

services:
  copilot-cli:
    image: ghcr.io/github/copilot-cli:latest
    # `--disable-builtin-mcps` keeps the CLI's bundled MCP servers off so the
    # container exposes the bare SDK surface only.
    command: ["--headless", "--port", "4321", "--disable-builtin-mcps"]
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      # Disable any user-configured MCP servers inside the container.
      - COPILOT_DISABLE_MCP=1
    ports:
      - "4321:4321"
    restart: always
    volumes:
      - session-data:/root/.copilot/session-state

  api:
    build: .
    environment:
      - CLI_URL=copilot-cli:4321
      - COPILOT_DISABLE_MCP=1
    depends_on:
      - copilot-cli
    ports:
      - "3000:3000"

volumes:
  session-data:
